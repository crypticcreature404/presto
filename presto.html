<!DOCTYPE html>
<html>
<head>
    <title>Presto Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #F4F4F4;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #1A1A1A;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
        }

        .sidebar h1 {
            font-size: 26px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .nav-item {
            margin: 15px 0;
            cursor: pointer;
            font-size: 16px;
        }

        .nav-item:hover {
            color: #D7263D;
        }

        /* Top bar */
        .topbar {
            margin-left: 240px;
            height: 60px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 20px;
            font-weight: bold;
        }

        /* Main content */
        .content {
            margin-left: 240px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h1>PRESTO</h1>

        <div class="nav-item">Dashboard</div>
        <div class="nav-item">Uploads</div>
        <div class="nav-item">Jobs</div>
        <div class="nav-item">Templates</div>
        <div class="nav-item">Approvals</div>
        <div class="nav-item">Settings</div>
    </div>

    <!-- Top bar -->
    <div class="topbar">
        Dashboard
    </div>

    <!-- Main content -->
    <div class="content">

        <div class="card">
            <h2>Quick Actions</h2>
            <p>Start a new upload, create a job, or review pending approvals.</p>
        </div>

        <div class="card">
            <h2>Recent Uploads</h2>
            <p>Your upload module can be embedded right here.</p>
        </div>

        <div class="card">
            <h2>Production Queue</h2>
            <p>Show current jobs, statuses, and next steps.</p>
        </div>

    </div>

</body>
</html>
